name: Lab 05 - Compose Readiness Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  compose-check:
    name: Validate Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create .env from example
        run: cp .env.example .env

      - name: Lint docker-compose.yml
        run: docker compose config --quiet

      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running containers
        run: docker compose ps

      - name: Test API /health
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:8000/health && exit 0
            echo "Retry $i..."
            sleep 5
          done
          docker compose logs api
          exit 1

      - name: Test AI service /health
        run: |
          for i in 1 2 3 4 5; do
            curl -fsS http://localhost:9000/health && exit 0
            echo "Retry $i..."
            sleep 5
          done
          docker compose logs ai-service
          exit 1

      - name: Test DB readiness
        run: |
          set -a
          . ./.env
          set +a
          docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"

      - name: Run Newman collection
        run: |
          mkdir -p reports
          newman run postman/collections/FIT4110_lab05_iot_compose.postman_collection.json \
            -e postman/environments/FIT4110_lab05_local.postman_environment.json \
            -r cli,junit,htmlextra \
            --reporter-junit-export reports/newman-lab05-compose.xml \
            --reporter-htmlextra-export reports/newman-lab05-compose.html

      - name: Verify readiness checklist
        run: |
          CHECKLIST="checklists/readiness-checklist.md"
          test -f "$CHECKLIST"
          TOTAL=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[ xX]\]' "$CHECKLIST" || true)
          CHECKED=$(grep -cE '^[[:space:]]*-[[:space:]]*\[[xX]\]' "$CHECKLIST" || true)
          echo "Readiness checklist: ${CHECKED:-0}/${TOTAL:-0} checked"
          test "${CHECKED:-0}" -ge 6

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          if-no-files-found: warn

      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
